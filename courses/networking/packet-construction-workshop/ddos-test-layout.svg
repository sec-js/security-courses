<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>DDoS test network layout</title>
  <desc>Network diagram showing MoonGen traffic generator connected to a router, which forwards traffic to a server under test. Management network shown separately.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- MoonGen generator box -->
  <rect x="40" y="80" width="160" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="120" y="118" text-anchor="middle" dominant-baseline="central" fill="#085041">MoonGen</text>
  <text font-family="sans-serif" font-size="12" x="120" y="138" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Dell Precision 3240</text>
  <text font-family="sans-serif" font-size="12" x="120" y="155" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Intel 82599 10G</text>

  <!-- Router box -->
  <rect x="260" y="80" width="160" height="100" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="130" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Router</text>

  <!-- Server / DUT box -->
  <rect x="480" y="80" width="160" height="100" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="560" y="120" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Server (DUT)</text>
  <text font-family="sans-serif" font-size="12" x="560" y="140" text-anchor="middle" dominant-baseline="central" fill="#993C1D">10.0.45.100</text>
  <text font-family="sans-serif" font-size="12" x="560" y="157" text-anchor="middle" dominant-baseline="central" fill="#993C1D">aa:bb:cc:dd:ee:ff</text>

  <!-- Arrow: MoonGen to Router -->
  <line x1="200" y1="120" x2="258" y2="120" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Router to Server -->
  <line x1="420" y1="120" x2="478" y2="120" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Traffic labels -->
  <text font-family="sans-serif" font-size="12" x="229" y="109" text-anchor="middle" fill="#444441">10G</text>
  <text font-family="sans-serif" font-size="12" x="449" y="109" text-anchor="middle" fill="#444441">10G</text>

  <!-- Packet annotation -->
  <text font-family="sans-serif" font-size="12" x="229" y="145" text-anchor="middle" fill="#444441">src: 10.1.2.3</text>
  <text font-family="sans-serif" font-size="12" x="229" y="160" text-anchor="middle" fill="#444441">dst: 10.0.45.100</text>
  <text font-family="sans-serif" font-size="12" x="229" y="175" text-anchor="middle" fill="#444441">dst MAC: router</text>

  <!-- Management network dashed box -->
  <rect x="40" y="270" width="600" height="100" rx="8" fill="none" stroke="#888780" stroke-dasharray="6 4" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="56" y="292" dominant-baseline="central" fill="#5F5E5A">Management network — 1G</text>

  <!-- eno1 box -->
  <rect x="60" y="305" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="130" y="323" text-anchor="middle" dominant-baseline="central" fill="#042C53">eno1</text>
  <text font-family="sans-serif" font-size="12" x="130" y="339" text-anchor="middle" dominant-baseline="central" fill="#185FA5">10.0.42.215</text>

  <!-- Operator box -->
  <rect x="480" y="305" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="550" y="323" text-anchor="middle" dominant-baseline="central" fill="#042C53">Operator</text>
  <text font-family="sans-serif" font-size="12" x="550" y="339" text-anchor="middle" dominant-baseline="central" fill="#185FA5">10.0.42.123</text>

  <!-- SSH arrow -->
  <line x1="478" y1="327" x2="202" y2="327" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- MoonGen NIC label -->
  <text font-family="sans-serif" font-size="12" x="120" y="205" text-anchor="middle" fill="#444441">enp1s0f0/f1 → igb_uio</text>
  <text font-family="sans-serif" font-size="12" x="120" y="220" text-anchor="middle" fill="#444441">00:25:90:32:9f:f2/f3</text>
</svg>
