<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" style="background:white;font-family:Arial,Helvetica,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Internet zone -->
  <rect x="20" y="90" width="120" height="120" rx="12" fill="none" stroke="#aaa" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="80" y="110" text-anchor="middle" font-size="12" fill="#888">Internet</text>

  <!-- Admin workstation -->
  <rect x="46" y="128" width="68" height="44" rx="6" fill="#f5f5f3" stroke="#ccc" stroke-width="0.5"/>
  <text x="80" y="148" text-anchor="middle" font-size="13" font-weight="500" fill="#2c2c2a">Admin</text>
  <text x="80" y="163" text-anchor="middle" font-size="11" fill="#5f5e5a">workstation</text>

  <!-- Arrow admin → jump -->
  <line x1="114" y1="150" x2="194" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="154" y="140" text-anchor="middle" font-size="11" fill="#888">SSH / RDP</text>

  <!-- FW 1 -->
  <line x1="196" y1="75" x2="196" y2="285" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="196" y="300" text-anchor="middle" font-size="11" fill="#888">FW 1</text>

  <!-- DMZ zone -->
  <text x="270" y="92" text-anchor="middle" font-size="11" fill="#185FA5">DMZ</text>
  <rect x="202" y="98" width="148" height="120" rx="12" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="276" y="148" text-anchor="middle" font-size="13" font-weight="500" fill="#2c2c2a">Jump server</text>
  <text x="276" y="164" text-anchor="middle" font-size="11" fill="#5f5e5a">Bastion · Audit · MFA</text>

  <!-- FW 2 -->
  <line x1="358" y1="75" x2="358" y2="285" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="358" y="300" text-anchor="middle" font-size="11" fill="#888">FW 2</text>

  <!-- Secure internal network zone -->
  <rect x="364" y="98" width="298" height="188" rx="12" fill="none" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="513" y="92" text-anchor="middle" font-size="11" fill="#0F6E56">Secure internal network</text>

  <!-- Ethernet line -->
  <line x1="350" y1="155" x2="648" y2="155" stroke="#0F6E56" stroke-width="2.5" stroke-linecap="round"/>
  <text x="400" y="145" text-anchor="middle" font-size="11" fill="#888">SSH</text>
  <line x1="648" y1="145" x2="648" y2="165" stroke="#0F6E56" stroke-width="2" stroke-linecap="round"/>

  <!-- Web server — down -->
  <line x1="420" y1="155" x2="420" y2="225" stroke="#0F6E56" stroke-width="1.2" stroke-linecap="round"/>
  <text x="420" y="242" text-anchor="middle" font-size="13" font-weight="500" fill="#2c2c2a">Web server</text>

  <!-- Database server — up -->
  <line x1="510" y1="155" x2="510" y2="118" stroke="#0F6E56" stroke-width="1.2" stroke-linecap="round"/>
  <text x="510" y="108" text-anchor="middle" font-size="13" font-weight="500" fill="#2c2c2a">Database server</text>

  <!-- App server — down -->
  <line x1="600" y1="155" x2="600" y2="225" stroke="#0F6E56" stroke-width="1.2" stroke-linecap="round"/>
  <text x="600" y="242" text-anchor="middle" font-size="13" font-weight="500" fill="#2c2c2a">App server</text>
</svg>
